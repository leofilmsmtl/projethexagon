<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            width: 380px;
            height: 860px;
        }

        .phone-wrapper {
            position: relative;
            width: 380px;
            height: 860px;
            overflow: hidden;
        }

        .phone-wrapper iframe {
            position: absolute;
            width: 1200px;
            height: 3000px;
            border: none;
            top: -100vh;
            /* skip the hero section */
            left: -410px;
            /* center the phone horizontally */
        }
    </style>
</head>

<body>
    <div class="phone-wrapper">
        <iframe src="../index.html#demo" scrolling="no" loading="lazy"></iframe>
    </div>
    <script>
        // Adjust offset once iframe loads to find the phone
        const iframe = document.querySelector('iframe');
        iframe.addEventListener('load', () => {
            try {
                const demoSection = iframe.contentDocument.querySelector('#demo');
                if (demoSection) {
                    const phone = iframe.contentDocument.querySelector('#gamePhone');
                    if (phone) {
                        const rect = phone.getBoundingClientRect();
                        iframe.style.top = -rect.top + 40 + 'px';
                        iframe.style.left = -rect.left + 10 + 'px';
                    }
                }
            } catch (e) {
                // Cross-origin fallback — manual offset
                iframe.style.top = '-940px';
                iframe.style.left = '-410px';
            }
        });
    </script>
</body>

</html>
